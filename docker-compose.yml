services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bolao_user
      POSTGRES_PASSWORD: bolao_pass
      POSTGRES_DB: bolao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao_user -d bolao_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bolao_user:bolao_pass@db:5432/bolao_db
      JWT_SECRET: troque-por-uma-chave-longa-e-aleatoria
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 587
      SMTP_USER: seu_usuario_smtp
      SMTP_PASS: sua_senha_smtp
      SMTP_FROM: '"Bolão Nevous" <noreply@bolaonevous.com>'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
